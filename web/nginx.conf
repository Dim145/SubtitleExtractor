server {
    listen 80;
    server_name _;

    # Videos can be large; don't cap upload size and stream them through.
    client_max_body_size 8192m;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API + signed file URLs to the Go service (same-origin to the browser).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;   # stream large uploads
        proxy_buffering off;           # stream SSE responses (text/event-stream)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
