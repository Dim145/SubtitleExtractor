server {
    listen 80;
    server_name _;

    # Videos can be large; don't cap upload size and stream them through.
    client_max_body_size 8192m;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers applied to every response from this server.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    # CSP for a self-contained SPA that talks same-origin /api and runs WASM
    # (web-demuxer, onnxruntime-web) in Web Workers. onnxruntime needs
    # 'wasm-unsafe-eval' (and 'unsafe-eval' as a fallback for older engines);
    # web-demuxer spawns its worker from a data: URL and onnxruntime from blob:,
    # so worker-src/child-src must allow both data: and blob:. images/fonts may
    # be data: URIs. frame-ancestors 'none' duplicates X-Frame-Options: DENY.
    # connect-src also allows the GitHub-hosted ONNX OCR models that
    # ppu-paddle-ocr fetches at runtime for in-browser extraction. (For a fully
    # offline/air-gapped deploy these should be self-hosted same-origin instead.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-eval' blob:; worker-src 'self' blob: data:; child-src 'self' blob: data:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self' data:; connect-src 'self' blob: https://media.githubusercontent.com https://raw.githubusercontent.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # Container healthcheck — served by nginx itself (no API dependency).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Proxy API + signed file URLs to the Go service (same-origin to the browser).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;   # stream large uploads
        proxy_buffering off;           # stream SSE responses (text/event-stream)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
