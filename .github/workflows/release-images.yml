name: Release images

# Build the container images and push them to the repo's GitHub Container
# Registry (ghcr.io) whenever a GitHub Release is published. The macOS worker is
# not containerized (it runs natively on the host), so only the API, web frontend
# and NVIDIA worker images are built.

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: ./api
            dockerfile: ./api/Dockerfile
          - component: web
            context: ./web
            dockerfile: ./web/Dockerfile
          - component: worker-nvidia
            context: ./worker
            dockerfile: ./worker/Dockerfile.nvidia

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The CUDA-based NVIDIA worker image is large; reclaim runner disk first.
      - name: Free disk space
        if: matrix.component == 'worker-nvidia'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image reference, so the mixed-case
          # repo name (Dim145/SubtitleExtractor) is handled automatically.
          images: ghcr.io/${{ github.repository }}-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ github.event_name == 'release' && github.event.release.prerelease == false }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  # Package the native macOS worker as a ready-to-run zip and attach it to the
  # release. Download → unzip → set .env → ./run.sh.
  package-macos-worker:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to upload the release asset
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build worker zip
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          NAME="subtitleextractor-worker-macos"
          STAGE="dist/$NAME"
          mkdir -p "$STAGE"
          cp -r worker/subextractor "$STAGE/"
          cp worker/pyproject.toml worker/run.sh worker/.env.example "$STAGE/"
          cp worker/PACKAGE.md "$STAGE/README.md"
          chmod +x "$STAGE/run.sh"
          # Strip any stray bytecode/caches from the checkout.
          find "$STAGE" -name '__pycache__' -type d -prune -exec rm -rf {} + || true
          ( cd dist && zip -r -q "../$NAME-$TAG.zip" "$NAME" )
          ls -lh "$NAME-$TAG.zip"

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" "subtitleextractor-worker-macos-$TAG.zip" --clobber \
            --repo "${{ github.repository }}"
