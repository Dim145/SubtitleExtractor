[project]
name = "subextractor-worker"
version = "0.1.0"
description = "SubtitleExtractor OCR worker (hardcoded subtitle extraction)"
requires-python = ">=3.10"
license = "AGPL-3.0-or-later"

# Core dependencies (CPU / Apple Silicon friendly). The default OCR backend is
# RapidOCR (ONNX). ffmpeg must be installed on the host (e.g. `brew install ffmpeg`).
dependencies = [
    "httpx>=0.27",
    "numpy>=1.26",
    "opencv-python-headless>=4.9",
    "scikit-image>=0.22",
    "rapidfuzz>=3.9",
    "rapidocr-onnxruntime>=1.3",
]

[project.optional-dependencies]
# Heavier PaddlePaddle-based backends. Install only if you select them.
ppocr = ["paddleocr>=2.7", "paddlepaddle>=2.6"]
# Apple-Silicon GPU OCR (PaddleOCR-VL on Metal via MLX). macOS arm64 only.
mlx = ["mlx-vlm>=0.3.11", "pillow>=10"]

[project.scripts]
subextractor-worker = "subextractor.__main__:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["subextractor*"]
